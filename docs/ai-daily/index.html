<style>
:root {
  --paper: #F2EEDF;
  --paper-2: #ECE6D2;
  --ink: #2A241B;
  --ink-soft: #5C5345;
  --ink-faint: rgba(42, 36, 27, 0.35);
  --pink: #E1A4C2;
  --lemon: #D6DD63;
  --blush: #E8C9B6;
  --sage: #B7C7A8;
  --lilac: #C9BEDC;
  --card-bg: rgba(255, 255, 255, 0.55);
  --border: rgba(42, 36, 27, 0.14);
  --border-strong: rgba(42, 36, 27, 0.25);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }
body {
  min-height: 100vh;
  background: var(--paper);
  color: var(--ink);
  font-family: "Work Sans", "Noto Sans SC", system-ui, sans-serif;
  font-weight: 300;
  font-size: 15px;
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
}

/* ═══════ Topbar ═══════ */
.topbar {
  position: sticky; top: 0; z-index: 100;
  background: rgba(242,238,223,0.88);
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
}
.topbar-inner {
  max-width: 1060px; margin: 0 auto; padding: 14px 28px;
  display: flex; align-items: center; justify-content: space-between; gap: 16px;
}
.topbar-brand { display: flex; align-items: center; gap: 12px; }
.topbar-dots { display: flex; gap: 6px; }
.topbar-dots i { width: 10px; height: 10px; border-radius: 50%; }
.topbar-name {
  font-family: "Cormorant Garamond", serif; font-weight: 500; font-size: 20px;
}
.topbar-name em { font-style: italic; font-weight: 400; }

/* Search */
.search-wrap { position: relative; flex: 0 0 300px; }
.search-input {
  width: 100%; padding: 10px 16px 10px 40px;
  border: 1px solid var(--border); border-radius: 999px;
  background: rgba(255,255,255,0.5);
  font-family: "Noto Sans SC", sans-serif; font-size: 13px; color: var(--ink);
  outline: none; transition: all 0.2s;
}
.search-input::placeholder { color: var(--ink-faint); }
.search-input:focus { border-color: var(--pink); background: rgba(255,255,255,0.9); box-shadow: 0 0 0 3px rgba(225,164,194,0.15); }
.search-ico { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); width: 16px; height: 16px; fill: var(--ink-faint); }

/* ═══════ Page ═══════ */
.page { max-width: 1060px; margin: 0 auto; padding: 36px 28px 80px; }

/* Hero */
.hero { text-align: center; margin-bottom: 36px; }
.hero h1 { font-family: "Cormorant Garamond", serif; font-weight: 500; font-size: 52px; line-height: 1; margin-bottom: 10px; }
.hero h1 em { font-style: italic; font-weight: 400; }
.hero-sub { font-family: "Noto Sans SC", sans-serif; font-size: 15px; color: var(--ink-soft); }
.hero-stats { display: flex; justify-content: center; gap: 28px; margin-top: 18px; }
.stat { text-align: center; }
.stat-num { font-family: "Cormorant Garamond", serif; font-size: 32px; font-weight: 500; color: var(--ink); line-height: 1.1; }
.stat-label { font-size: 12px; color: var(--ink-faint); letter-spacing: 0.04em; }

/* ═══════ Filter Bar ═══════ */
.filter-bar {
  display: flex; align-items: center; gap: 12px; margin-bottom: 28px;
  padding-bottom: 16px; border-bottom: 1px solid var(--border);
  flex-wrap: wrap;
}
.filter-group { display: flex; gap: 6px; flex-wrap: wrap; }
.filter-label {
  font-family: "Cormorant Garamond", serif; font-style: italic; font-size: 13px;
  color: var(--ink-faint); margin-right: 4px; align-self: center;
}
.pill {
  padding: 6px 16px; border-radius: 999px; font-family: "Noto Sans SC", sans-serif;
  font-size: 13px; font-weight: 400; color: var(--ink-soft); cursor: pointer;
  border: 1px solid var(--border); background: transparent; transition: all 0.2s;
}
.pill:hover { color: var(--ink); background: rgba(255,255,255,0.5); border-color: var(--border-strong); }
.pill.active { color: var(--ink); background: var(--pink); border-color: var(--pink); font-weight: 500; }
.pill .cnt { font-size: 11px; margin-left: 4px; opacity: 0.6; }

.tag-pills { display: flex; gap: 6px; flex-wrap: wrap; margin-left: auto; }
.tag-pill {
  padding: 4px 12px; border-radius: 999px; font-size: 11px; font-weight: 400;
  color: var(--ink-soft); background: var(--paper-2); border: 1px solid transparent;
  cursor: pointer; transition: all 0.15s;
}
.tag-pill:hover { border-color: var(--border-strong); color: var(--ink); }
.tag-pill.active { background: var(--sage); color: var(--ink); border-color: var(--sage); }

/* ═══════ Cards ═══════ */
.card-list { display: flex; flex-direction: column; gap: 18px; }

.card {
  background: var(--card-bg); border-radius: 24px; overflow: hidden;
  border: 1px solid transparent; transition: all 0.25s;
}
.card:hover { border-color: var(--border); box-shadow: 0 8px 28px rgba(42,36,27,0.06); }

.card-main {
  display: flex; align-items: flex-start; gap: 18px; padding: 24px 28px;
  text-decoration: none; color: inherit; cursor: pointer;
}

/* Badge */
.badge {
  flex-shrink: 0; width: 54px; height: 54px; border-radius: 16px;
  display: flex; align-items: center; justify-content: center;
  font-family: "Cormorant Garamond", serif; font-style: italic; font-size: 20px; color: var(--ink);
}
.badge-weekly { background: var(--pink); }
.badge-daily { background: var(--lemon); }

/* Body */
.card-body { flex: 1; min-width: 0; }
.card-head { display: flex; align-items: center; gap: 10px; margin-bottom: 4px; }
.card-type-label {
  font-family: "Cormorant Garamond", serif; font-style: italic; font-size: 11px;
  letter-spacing: 0.8px; color: var(--ink-faint); text-transform: uppercase;
}
.card-date { font-family: "Work Sans", sans-serif; font-size: 11px; color: var(--ink-faint); }
.card-title {
  font-family: "Noto Sans SC", sans-serif; font-size: 17px; font-weight: 600;
  color: var(--ink); line-height: 1.4; margin-bottom: 3px;
}
.card-subtitle {
  font-family: "Noto Sans SC", sans-serif; font-size: 13px; font-weight: 300;
  color: var(--ink-soft); margin-bottom: 10px;
}
.card-tags { display: flex; flex-wrap: wrap; gap: 5px; }
.card-tag {
  padding: 2px 9px; border-radius: 999px; font-size: 11px; font-weight: 400;
  color: var(--ink-soft); background: var(--paper-2);
}

/* Expand toggle */
.card-actions { display: flex; align-items: center; gap: 10px; flex-shrink: 0; align-self: center; }
.btn-expand {
  width: 34px; height: 34px; border-radius: 50%; border: 1px solid var(--border);
  background: var(--paper-2); display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: all 0.2s;
}
.btn-expand:hover { background: var(--blush); border-color: var(--blush); }
.btn-expand svg { width: 14px; height: 14px; fill: var(--ink-soft); transition: transform 0.25s; }
.btn-expand.open svg { transform: rotate(180deg); }

.btn-open {
  padding: 7px 16px; border-radius: 999px; font-family: "Noto Sans SC", sans-serif;
  font-size: 12px; font-weight: 500; color: var(--ink); background: var(--paper-2);
  border: 1px solid var(--border); text-decoration: none; transition: all 0.2s; white-space: nowrap;
}
.btn-open:hover { background: var(--pink); border-color: var(--pink); }

/* ═══════ Preview Panel ═══════ */
.card-preview {
  max-height: 0; overflow: hidden; transition: max-height 0.35s ease;
  border-top: 0px solid var(--border);
}
.card-preview.open { max-height: 600px; border-top-width: 1px; }

.preview-inner { padding: 20px 28px 24px; }

.preview-items { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.preview-item {
  display: flex; align-items: flex-start; gap: 10px;
  padding: 10px 14px; border-radius: 12px; background: rgba(255,255,255,0.45);
}
.preview-num {
  font-family: "Cormorant Garamond", serif; font-style: italic; font-size: 20px;
  line-height: 1; color: var(--ink-faint); flex-shrink: 0; width: 24px; text-align: right;
}
.preview-text {
  font-family: "Noto Sans SC", sans-serif; font-size: 13px; font-weight: 400;
  color: var(--ink-soft); line-height: 1.5;
}
.preview-text strong { font-weight: 600; color: var(--ink); }

/* colors per item */
.preview-item:nth-child(4n+1) { border-left: 3px solid var(--pink); }
.preview-item:nth-child(4n+2) { border-left: 3px solid var(--lemon); }
.preview-item:nth-child(4n+3) { border-left: 3px solid var(--blush); }
.preview-item:nth-child(4n)   { border-left: 3px solid var(--sage); }

/* Empty */
.empty-state { text-align: center; padding: 60px 20px; color: var(--ink-faint); font-size: 16px; display: none; }
.empty-state.visible { display: block; }

/* Footer */
.footer { margin-top: 48px; padding-top: 20px; border-top: 1px solid var(--border); text-align: center; }
.footer p { font-family: "Cormorant Garamond", serif; font-style: italic; font-size: 14px; color: var(--ink-faint); }

/* Responsive */
@media (max-width: 700px) {
  .topbar-inner { flex-wrap: wrap; }
  .search-wrap { flex: 1 1 100%; order: 3; }
  .hero h1 { font-size: 36px; }
  .hero-stats { gap: 16px; }
  .card-main { flex-direction: column; gap: 10px; padding: 18px 20px; }
  .badge { width: 42px; height: 42px; font-size: 16px; }
  .preview-items { grid-template-columns: 1fr; }
  .filter-bar { flex-direction: column; align-items: flex-start; }
  .tag-pills { margin-left: 0; }
}
</style>
</head>

    items: []

// Collect all unique tags
const allTags = [...new Set(DATA.flatMap(d => d.tags))].sort();

// State
let activeType = 'all';
let activeTag = null;
let searchQ = '';

// Build tag pills
function buildTagPills() {
  const el = document.getElementById('tagFilter');
  el.innerHTML = allTags.map(t =>
    '<button class="tag-pill" data-tag="' + t + '">' + t + '</button>'
  ).join('');
}

// Render
function render() {
  let list = DATA;
  if (activeType !== 'all') list = list.filter(d => d.type === activeType);
  if (activeTag) list = list.filter(d => d.tags.includes(activeTag));
  if (searchQ.trim()) {
    const q = searchQ.toLowerCase();
    list = list.filter(d =>
      d.title.toLowerCase().includes(q) ||
      d.subtitle.toLowerCase().includes(q) ||
      d.tags.some(t => t.toLowerCase().includes(q)) ||
      d.items.some(it => it.text.toLowerCase().includes(q))
    );
  }

  const container = document.getElementById('cardList');
  const empty = document.getElementById('emptyState');

  if (!list.length) { container.innerHTML = ''; empty.classList.add('visible'); return; }
  empty.classList.remove('visible');

  container.innerHTML = list.map((d, i) => {
    const badgeClass = d.type === 'weekly' ? 'badge-weekly' : 'badge-daily';
    const badgeText = d.type === 'weekly' ? '#' + (d.issue || '') : '\u2606';
    const typeLabel = d.type === 'weekly' ? 'Weekly Report' : 'Daily Report';
    const hasItems = d.items && d.items.length > 0;

    let previewHTML = '';
    if (hasItems) {
      previewHTML = '<div class="card-preview" id="preview-' + i + '"><div class="preview-inner"><div class="preview-items">' +
        d.items.map(it =>
          '<div class="preview-item"><span class="preview-num">' + it.num + '</span><span class="preview-text">' + it.text + '</span></div>'
        ).join('') +
        '</div></div></div>';
    }

    return '<div class="card">' +
      '<div class="card-main" onclick="window.location.href=\'' + d.url + '\'">' +
        '<div class="badge ' + badgeClass + '">' + badgeText + '</div>' +
        '<div class="card-body">' +
          '<div class="card-head"><span class="card-type-label">' + typeLabel + '</span><span class="card-date">' + d.date + '</span></div>' +
          '<div class="card-title">' + d.title + '</div>' +
          '<div class="card-subtitle">' + d.subtitle + '</div>' +
          '<div class="card-tags">' + d.tags.map(t => '<span class="card-tag">' + t + '</span>').join('') + '</div>' +
        '</div>' +
        '<div class="card-actions">' +
          (hasItems ? '<button class="btn-expand" onclick="event.stopPropagation();togglePreview(' + i + ',this)" title="\u5c55\u5f00\u9884\u89c8"><svg viewBox="0 0 24 24"><path d="M7.41 8.59L12 13.17l4.59-4.58L18 10l-6 6-6-6z"/></svg></button>' : '') +
          '<a class="btn-open" href="' + d.url + '" onclick="event.stopPropagation()">\u6253\u5f00 \u2192</a>' +
        '</div>' +
      '</div>' +
      previewHTML +
    '</div>';
  }).join('');
}

function togglePreview(idx, btn) {
  const el = document.getElementById('preview-' + idx);
  if (!el) return;
  el.classList.toggle('open');
  btn.classList.toggle('open');
}

// Stats
function updateStats() {
  document.getElementById('statTotal').textContent = DATA.length;
  document.getElementById('statWeekly').textContent = DATA.filter(d => d.type === 'weekly').length;
  document.getElementById('statDaily').textContent = DATA.filter(d => d.type === 'daily').length;
}

// Events: type filter
document.getElementById('typeFilter').addEventListener('click', e => {
  const btn = e.target.closest('.pill');
  if (!btn) return;
  document.querySelectorAll('#typeFilter .pill').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  activeType = btn.dataset.filter;
  render();
});

// Events: tag filter
document.getElementById('tagFilter').addEventListener('click', e => {
  const btn = e.target.closest('.tag-pill');
  if (!btn) return;
  if (btn.classList.contains('active')) {
    btn.classList.remove('active');
    activeTag = null;
  } else {
    document.querySelectorAll('.tag-pill').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    activeTag = btn.dataset.tag;
  }
  render();
});

// Events: search
document.getElementById('searchInput').addEventListener('input', e => {
  searchQ = e.target.value;
  render();
});

// Init
buildTagPills();
updateStats();
render();
</script>
</body>
</html>
