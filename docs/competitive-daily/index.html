function groupByDate(items) {
  const groups = {};
  items.forEach(item => {
    const d = item.date;
    if (!groups[d]) groups[d] = [];
    groups[d].push(item);
  });
  return Object.entries(groups).sort((a,b) => b[0].localeCompare(a[0]));
}

function formatDate(dateStr) {
  const [y,m,d] = dateStr.split('-');
  const dt = new Date(dateStr);
  const weekdays = ['SUN','MON','TUE','WED','THU','FRI','SAT'];
  return y + '.' + m + '.' + d + ' ' + weekdays[dt.getDay()];
}

function getFilteredItems() {
  let items = DATA;
  if (activeFilter === 'toc') items = items.filter(i => i.type === 'toc');
  else if (activeFilter === 'card') items = items.filter(i => i.type === 'card');
  else if (activeFilter.startsWith('tag:')) {
    const tag = activeFilter.slice(4).toLowerCase();
    items = items.filter(i => i.tags.some(t => t.toLowerCase().includes(tag)));
  }
  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    items = items.filter(i => i.title.toLowerCase().includes(q) || i.desc.toLowerCase().includes(q) || i.tags.some(t => t.toLowerCase().includes(q)));
  }
  return items;
}

function render() {
  const items = getFilteredItems();
  const feed = document.getElementById('feed');
  const empty = document.getElementById('empty');

  if (!items.length) { feed.innerHTML=''; empty.classList.add('visible'); return; }
  empty.classList.remove('visible');

  const groups = groupByDate(items);
  feed.innerHTML = groups.map(([date, entries]) => {
    return '<div class="date-group"><div class="date-label">' + formatDate(date) + '</div>' +
      entries.map(item => {
        const dotClass = item.type === 'toc' ? 'toc' : 'card';
        const sourceLabel = item.type === 'toc' ? 'TOC INTERACTIVE' : 'DARK OPS CARD';
        const emoji = item.type === 'toc' ? '\u25A0' : '\u25C6';
        return '<div class="feed-item type-' + item.type + '">' +
          '<div class="time-col">' + item.time + '</div>' +
          '<a class="feed-card" href="' + item.url + '">' +
            '<div class="feed-card-head"><div class="feed-source"><span class="source-dot ' + dotClass + '">' + emoji + '</span><span class="feed-type-label">' + sourceLabel + '</span></div></div>' +
            '<div class="feed-title">' + item.title + '</div>' +
            '<div class="feed-desc">' + item.desc + '</div>' +
            '<div class="feed-tags">' + item.tags.map(t => '<span class="feed-tag">' + t + '</span>').join('') + '</div>' +
          '</a>' +
        '</div>';
      }).join('') +
    '</div>';
  }).join('');
}

function handleSearch() {
  searchQuery = document.getElementById('searchInput').value.trim();
  render();
}

function navClick(btn) {
  document.querySelectorAll('.nav-item').forEach(function(n) { n.classList.remove('active'); });
  btn.classList.add('active');
  activeFilter = btn.dataset.nav;
  var titles = {all:'全部竞品日报', toc:'TOC 互动版', card:'9:16 卡片版'};
  document.querySelector('.page-title').textContent = titles[activeFilter] || '全部竞品日报';
  document.querySelectorAll('.ftab').forEach(function(t) { t.classList.remove('active'); });
  var matchTab = document.querySelector('.ftab[data-filter="' + activeFilter + '"]');
  if (matchTab) matchTab.classList.add('active');
  render();
  buildTimeline();
  if (window.innerWidth <= 768) document.querySelector('.sidebar').classList.remove('open');
}

document.getElementById('typeRow').addEventListener('click', function(e) {
  var btn = e.target.closest('.ftab');
  if (!btn) return;
  if (btn.dataset.filter.startsWith('tag:')) {
    if (btn.classList.contains('active')) {
      btn.classList.remove('active');
      activeFilter = document.querySelector('.nav-item.active').dataset.nav || 'all';
    } else {
      document.querySelectorAll('.ftab[data-filter^="tag:"]').forEach(function(t) { t.classList.remove('active'); });
      btn.classList.add('active');
      activeFilter = btn.dataset.filter;
    }
  } else {
    document.querySelectorAll('.ftab').forEach(function(t) { t.classList.remove('active'); });
    btn.classList.add('active');
    activeFilter = btn.dataset.filter;
    document.querySelectorAll('.nav-item').forEach(function(n) { n.classList.remove('active'); });
    var navMatch = document.querySelector('.nav-item[data-nav="' + activeFilter + '"]');
    if (navMatch) navMatch.classList.add('active');
    var titles = {all:'全部竞品日报', toc:'TOC 互动版', card:'9:16 卡片版'};
    document.querySelector('.page-title').textContent = titles[activeFilter] || '全部竞品日报';
  }
  render();
  buildTimeline();
});

render();

function buildTimeline() {
  var tl = document.getElementById('rightTimeline');
  var typeFilter = 'all';
  if (activeFilter === 'toc' || activeFilter === 'card') typeFilter = activeFilter;
  var items = typeFilter === 'all' ? DATA : DATA.filter(function(d) { return d.type === typeFilter; });

  var groups = {};
  items.forEach(function(item) {
    var ym = item.date.slice(0,7);
    if (!groups[ym]) groups[ym] = [];
    groups[ym].push(item);
  });
  var html = '<div class="rt-title">ARCHIVE</div>';
  Object.keys(groups).sort().reverse().forEach(function(ym) {
    var parts = ym.split('-');
    html += '<div class="rt-group"><div class="rt-year">' + parts[0] + '.' + parts[1] + '</div>';
    groups[ym].sort(function(a,b) { return b.date.localeCompare(a.date); }).forEach(function(item) {
      var d = item.date.split('-')[2];
      var typeLabel = item.type === 'toc' ? 'TOC' : 'CARD';
      html += '<a class="rt-item" href="' + item.url + '"><span class="rt-dot ' + item.type + '"></span><span class="rt-label">' + d + '日</span><span class="rt-type">' + typeLabel + '</span></a>';
    });
    html += '</div>';
  });
  tl.innerHTML = html;
}
buildTimeline();
</script>
</body>
