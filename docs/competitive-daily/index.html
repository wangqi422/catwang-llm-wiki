  --paper: #F2EEDF; --paper-2: #ECE6D2; --paper-3: #E8E2D0;

  --sidebar-w: 200px;
}
* { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior:smooth; }
body {
  min-height:100vh; background:var(--paper);
  color:var(--ink); font-family:"Work Sans","Noto Sans SC",system-ui,sans-serif;
  font-weight:300; font-size:14px; line-height:1.6; -webkit-font-smoothing:antialiased;
}

/* ═══ Left Sidebar ═══ */
.sidebar {
  position:fixed; top:0; left:0; width:var(--sidebar-w); height:100vh;
  background:rgba(255,255,255,0.6); backdrop-filter:blur(20px);
  border-right:1px solid var(--border); padding:28px 0;
  display:flex; flex-direction:column; z-index:100;
}
.sidebar-brand { padding:0 20px 24px; border-bottom:1px solid var(--border); margin-bottom:12px; }
.sidebar-logo {
  font-family:"Cormorant Garamond",serif; font-weight:600; font-size:18px; color:var(--ink);
}
.sidebar-logo em { font-style:italic; color:var(--fire); }
.sidebar-sub { font-family:"Noto Sans SC",sans-serif; font-size:11px; color:var(--ink-faint); margin-top:4px; }

.sidebar-nav { flex:1; padding:0 12px; }
.nav-item {
  display:flex; align-items:center; gap:10px; padding:10px 12px; width:100%;
  border-radius:10px; color:var(--ink-soft); text-decoration:none;
  font-family:"Noto Sans SC",sans-serif; font-size:13px; font-weight:400;
  transition:all 0.15s; margin-bottom:2px;
  background:none; border:none; cursor:pointer; text-align:left;
}
.nav-item:hover { background:rgba(42,36,27,0.04); color:var(--ink); }
.nav-item.active { background:rgba(224,122,95,0.12); color:var(--fire); font-weight:500; }
.nav-icon { width:18px; height:18px; fill:currentColor; flex-shrink:0; opacity:0.7; }
.nav-item.active .nav-icon { opacity:1; }

.sidebar-footer {
  padding:16px 20px 0; border-top:1px solid var(--border); margin-top:auto;
  display:flex; gap:6px;
}
.sidebar-footer i { width:8px; height:8px; border-radius:50%; }

.sidebar-links { padding:12px 16px 0; }
.sidebar-link {
  display:block; padding:8px 12px; text-decoration:none;
  font-family:"Noto Sans SC",sans-serif; font-size:12px; color:var(--ink-faint);
  border:1px solid var(--border); border-radius:8px; text-align:center;
  transition:all 0.15s; margin-bottom:6px;
}
.sidebar-link:hover { color:var(--fire); border-color:rgba(224,122,95,0.3); }

/* ═══ Main ═══ */
.main { margin-left:var(--sidebar-w); min-height:100vh; display:flex; }
.main-content { flex:1; min-width:0; }
.right-timeline {
  position:sticky; top:0; width:200px; height:100vh; flex-shrink:0;
  border-left:1px solid var(--border); padding:32px 16px;
  overflow-y:auto; background:rgba(255,255,255,0.3);
}
.rt-title {
  font-family:"Cormorant Garamond",serif; font-style:italic; font-size:13px;
  color:var(--ink-faint); letter-spacing:0.5px; margin-bottom:16px; padding-bottom:8px;
  border-bottom:1px solid var(--border);
}
.rt-group { margin-bottom:16px; }
.rt-year {
  font-family:"Work Sans",sans-serif; font-size:11px; font-weight:500;
  color:var(--ink-faint); letter-spacing:0.08em; margin-bottom:6px;
}
.rt-item {
  display:flex; align-items:center; gap:8px; padding:5px 8px;
  border-radius:6px; text-decoration:none; color:var(--ink-soft);
  font-size:12px; font-family:"Noto Sans SC",sans-serif; transition:all 0.15s;
  margin-bottom:2px;
}
.rt-item:hover { background:rgba(42,36,27,0.04); color:var(--ink); }
.rt-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
.rt-dot.toc { background:var(--fire); }
.rt-dot.card { background:var(--amber); }
.rt-label { flex:1; }
.rt-type { font-family:"Cormorant Garamond",serif; font-style:italic; font-size:10px; color:var(--ink-faint); }

/* ═══ Header ═══ */
.page-header { padding:32px 40px 0; max-width:960px; }
.page-title {
  font-family:"Noto Sans SC",sans-serif; font-size:28px; font-weight:700; color:var(--ink); margin-bottom:4px;
}
.page-desc { font-size:14px; color:var(--ink-faint); margin-bottom:24px; }

/* ═══ Filter Tabs ═══ */
.filter-row {
  display:flex; gap:8px; flex-wrap:wrap; padding:0 40px; max-width:960px; margin-bottom:8px;
}
.filter-row + .filter-row { margin-top:0; margin-bottom:20px; }
.ftab {
  padding:6px 14px; border-radius:999px; font-size:13px; font-weight:400;
  color:var(--ink-soft); background:rgba(255,255,255,0.5); border:1px solid var(--border);
  cursor:pointer; transition:all 0.15s; font-family:"Noto Sans SC",sans-serif;
}
.ftab:hover { background:rgba(255,255,255,0.8); color:var(--ink); }
.ftab.active { background:var(--fire); color:#fff; border-color:var(--fire); font-weight:500; }
.ftab-sep { width:1px; height:24px; background:var(--border); align-self:center; margin:0 4px; }

/* ═══ Timeline Feed ═══ */
.feed { padding:0 40px 80px; max-width:960px; }

.date-group { margin-bottom:32px; }
.date-label {
  font-family:"Work Sans",sans-serif; font-size:12px; font-weight:500;
  color:var(--ink-faint); letter-spacing:0.05em; margin-bottom:12px; padding-left:4px;
}

.feed-item {
  display:flex; gap:16px; margin-bottom:16px; position:relative;
  padding-left:20px;
}
.feed-item::before {
  content:''; position:absolute; left:0; top:10px;
  width:10px; height:10px; border-radius:50%; background:var(--sage);
  border:2px solid var(--paper);
}
.feed-item.type-toc::before { background:var(--fire); }
.feed-item.type-card::before { background:var(--amber); }
.feed-item::after {
  content:''; position:absolute; left:4px; top:22px; bottom:-16px;
  width:2px; background:var(--border);
}
.date-group .feed-item:last-child::after { display:none; }

.time-col {
  flex-shrink:0; width:48px; text-align:right;
  font-family:"Work Sans",sans-serif; font-size:12px; color:var(--ink-faint);
  padding-top:4px;
}

.feed-card {
  flex:1; background:var(--card-bg); border-radius:18px; padding:20px 24px;
  border:1px solid transparent; transition:all 0.2s; cursor:pointer;
  text-decoration:none; color:inherit; display:block;
}
.feed-card:hover { border-color:var(--border); box-shadow:0 6px 20px rgba(42,36,27,0.06); transform:translateY(-1px); }

.feed-card-head { display:flex; align-items:center; gap:8px; margin-bottom:6px; }
.feed-source { display:flex; align-items:center; gap:6px; font-size:12px; color:var(--ink-faint); }
.source-dot {
  width:20px; height:20px; border-radius:50%; display:flex; align-items:center;
  justify-content:center; font-size:10px; color:#fff;
}
.source-dot.toc { background:var(--fire); }
.source-dot.card { background:var(--amber); }
.feed-type-label { font-family:"Cormorant Garamond",serif; font-style:italic; font-size:12px; }

.feed-title {
  font-family:"Noto Sans SC",sans-serif; font-size:16px; font-weight:600;
  color:var(--ink); line-height:1.45; margin-bottom:4px;
}
.feed-desc {
  font-family:"Noto Sans SC",sans-serif; font-size:13px; font-weight:300;
  color:var(--ink-soft); line-height:1.6; margin-bottom:10px;
}
.feed-tags { display:flex; flex-wrap:wrap; gap:5px; }
.feed-tag {
  padding:3px 9px; border-radius:6px; font-size:11px;
  color:var(--ink-soft); background:var(--paper-2); font-weight:400;
}

/* ═══ Empty ═══ */
.empty { text-align:center; padding:60px 20px; color:var(--ink-faint); display:none; }
.empty.visible { display:block; }

/* ═══ Mobile ═══ */
.menu-toggle {
  display:none; position:fixed; top:14px; left:14px; z-index:200;
  width:36px; height:36px; background:rgba(255,255,255,0.9); border:1px solid var(--border);

@media(max-width:768px) {
  .sidebar { transform:translateX(-100%); transition:transform 0.3s; }
  .sidebar.open { transform:translateX(0); }
  .main { margin-left:0; }
  .menu-toggle { display:flex; }
  .page-header, .filter-row, .feed { padding-left:20px; padding-right:20px; }
  .right-timeline { display:none; }
}

let activeFilter = 'all';

function groupByDate(items) {
  const groups = {};
  items.forEach(item => {
    const d = item.date;
    if (!groups[d]) groups[d] = [];
    groups[d].push(item);
  });
  return Object.entries(groups).sort((a,b) => b[0].localeCompare(a[0]));
}

function formatDate(dateStr) {
  const [y,m,d] = dateStr.split('-');
  const dt = new Date(dateStr);
  const weekdays = ['\u661f\u671f\u65e5','\u661f\u671f\u4e00','\u661f\u671f\u4e8c','\u661f\u671f\u4e09','\u661f\u671f\u56db','\u661f\u671f\u4e94','\u661f\u671f\u516d'];
  return m + '\u6708' + d + '\u65e5 ' + weekdays[dt.getDay()];
}

function render() {
  let items = DATA;
  if (activeFilter === 'toc') items = items.filter(i => i.type === 'toc');
  else if (activeFilter === 'card') items = items.filter(i => i.type === 'card');
  else if (activeFilter.startsWith('tag:')) {
    const tag = activeFilter.slice(4).toLowerCase();
    items = items.filter(i => i.tags.some(t => t.toLowerCase().includes(tag)));
  }

  const feed = document.getElementById('feed');
  const empty = document.getElementById('empty');

  if (!items.length) { feed.innerHTML=''; empty.classList.add('visible'); return; }
  empty.classList.remove('visible');

  const groups = groupByDate(items);
  feed.innerHTML = groups.map(([date, entries]) => {
    return '<div class="date-group"><div class="date-label">' + formatDate(date) + '</div>' +
      entries.map(item => {
        const dotClass = item.type === 'toc' ? 'toc' : 'card';
        const sourceLabel = item.type === 'toc' ? 'TOC Interactive' : 'Dark Ops Card';
        const emoji = item.type === 'toc' ? '\u{1f4cb}' : '\u{1f3ae}';
        return '<div class="feed-item type-' + item.type + '">' +
          '<div class="time-col">' + item.time + '</div>' +
          '<a class="feed-card" href="' + item.url + '">' +
            '<div class="feed-card-head"><div class="feed-source"><span class="source-dot ' + dotClass + '">' + emoji + '</span><span class="feed-type-label">' + sourceLabel + '</span></div></div>' +
            '<div class="feed-title">' + item.title + '</div>' +
            '<div class="feed-desc">' + item.desc + '</div>' +
            '<div class="feed-tags">' + item.tags.map(t => '<span class="feed-tag">' + t + '</span>').join('') + '</div>' +
          '</a>' +
        '</div>';
      }).join('') +
    '</div>';
  }).join('');
}

function navClick(btn) {
  document.querySelectorAll('.nav-item').forEach(function(n) { n.classList.remove('active'); });
  btn.classList.add('active');
  activeFilter = btn.dataset.nav;
  var titles = {all:'\u5168\u90e8\u7ade\u54c1\u65e5\u62a5', toc:'TOC \u4e92\u52a8\u7248', card:'9:16 \u5361\u7247\u7248'};
  document.querySelector('.page-title').textContent = titles[activeFilter] || '\u5168\u90e8\u7ade\u54c1\u65e5\u62a5';
  document.querySelectorAll('.ftab').forEach(function(t) { t.classList.remove('active'); });
  var matchTab = document.querySelector('.ftab[data-filter="' + activeFilter + '"]');
  if (matchTab) matchTab.classList.add('active');
  render();
  buildTimeline();
  if (window.innerWidth <= 768) document.querySelector('.sidebar').classList.remove('open');
}

document.getElementById('typeRow').addEventListener('click', function(e) {
  var btn = e.target.closest('.ftab');
  if (!btn) return;
  if (btn.dataset.filter.startsWith('tag:')) {
    if (btn.classList.contains('active')) {
      btn.classList.remove('active');
      activeFilter = document.querySelector('.nav-item.active').dataset.nav || 'all';
    } else {
      document.querySelectorAll('.ftab[data-filter^="tag:"]').forEach(function(t) { t.classList.remove('active'); });
      btn.classList.add('active');
      activeFilter = btn.dataset.filter;
    }
  } else {
    document.querySelectorAll('.ftab').forEach(function(t) { t.classList.remove('active'); });
    btn.classList.add('active');
    activeFilter = btn.dataset.filter;
    document.querySelectorAll('.nav-item').forEach(function(n) { n.classList.remove('active'); });
    var navMatch = document.querySelector('.nav-item[data-nav="' + activeFilter + '"]');
    if (navMatch) navMatch.classList.add('active');
    var titles = {all:'\u5168\u90e8\u7ade\u54c1\u65e5\u62a5', toc:'TOC \u4e92\u52a8\u7248', card:'9:16 \u5361\u7247\u7248'};
    document.querySelector('.page-title').textContent = titles[activeFilter] || '\u5168\u90e8\u7ade\u54c1\u65e5\u62a5';
  }
  render();
  buildTimeline();
});

render();

function buildTimeline() {
  var tl = document.getElementById('rightTimeline');
  var typeFilter = 'all';
  if (activeFilter === 'toc' || activeFilter === 'card') typeFilter = activeFilter;
  var items = typeFilter === 'all' ? DATA : DATA.filter(function(d) { return d.type === typeFilter; });

  var tlTitle = typeFilter === 'toc' ? 'TOC Timeline' : typeFilter === 'card' ? 'Card Timeline' : 'Archive Timeline';

  var groups = {};
  items.forEach(function(item) {
    var year = item.date.split('-')[0];
    if (!groups[year]) groups[year] = [];
    groups[year].push(item);
  });
  var html = '<div class="rt-title">' + tlTitle + '</div>';
  Object.keys(groups).sort().reverse().forEach(function(year) {
    html += '<div class="rt-group"><div class="rt-year">' + year + '</div>';
    groups[year].sort(function(a,b) { return b.date.localeCompare(a.date); }).forEach(function(item) {
      var parts = item.date.split('-');
      var label = parts[1] + '.' + parts[2];
      var typeLabel = item.type === 'toc' ? 'TOC' : 'Card';
      html += '<a class="rt-item" href="' + item.url + '"><span class="rt-dot ' + item.type + '"></span><span class="rt-label">' + label + '</span><span class="rt-type">' + typeLabel + '</span></a>';
    });
    html += '</div>';
  });
  tl.innerHTML = html;
}
buildTimeline();
</script>
</body>
</html>
